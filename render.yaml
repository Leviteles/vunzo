services:
  - type: web
    name: vunzo
    env: node
    # Roda na raiz do repositório: instala, builda frontend+backend, inicia servidor
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.5.0
      # Configure essas variáveis no painel do Render:
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # URL do frontend no Netlify (ex: https://seu-app.netlify.app)
      - key: FRONTEND_URL
        sync: false
