[build]
  command = "vite build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["prompt.txt"]

# Rotas da API → Netlify Function
[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/financial/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA fallback (deve ser o último)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
